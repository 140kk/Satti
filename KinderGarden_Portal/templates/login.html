<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Satti CRM | Вход</title>
    <link rel="icon" href="{{ url_for('static', filename='images/sattiikona.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #001646; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #FFC107; }
        button { width: 100%; background: #FFC107; color: #2c3e50; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e0a800; transform: scale(0.98); }
        .error-msg { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f5c6cb; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="margin-bottom: 20px; color: #333; text-transform: uppercase; letter-spacing: 1px;">Satti CRM</h2>
        
        {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Логин администратора" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти в систему</button>
        </form>
        
        <div style="margin-top: 20px;">
            <a href="/" style="color: #7f8c8d; text-decoration: none; font-size: 0.95rem; font-weight: bold; transition: 0.3s;">
                ← Вернуться на сайт
            </a>
        </div>

    </div>
</body>
</html>
