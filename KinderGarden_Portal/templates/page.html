<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} | Детский сад SATTI</title>
    <link rel="icon" href="{{ url_for('static', filename='images/sattiikona.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@700&family=Nunito:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body.inner-page {
            background-image: url('../static/images/bg_nomain.jpg');
            background-size: 100% 100%; 
            background-attachment: fixed;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content-container {
            background: rgba(255, 255, 255, 0.85); 
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .home-btn { display: inline-block; background: #FF8C00; color: white; padding: 10px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .home-btn:hover { transform: scale(1.05); background: #e07b00; }
        h1 { font-family: 'Balsamiq Sans', cursive; color: #2E8B57; margin-bottom: 20px; font-size: 2.5rem;}
    </style>
</head>
<body class="inner-page">
    <div class="content-container">
        <a href="/" class="home-btn">🏠 На главную</a>
        <h1>{{ title }}</h1>
        <div style="font-size: 1.2rem; line-height: 1.6; color: #444; text-align: left;">
            {{ content|safe }}
        </div>
    </div>
</body>
</html>
